# 人员需求申请表单定义 (Personnel Requisition Form Definition)
# 版本: 1.0
# 描述: 用于定义人员需求申请的表单结构、类型和校验规则

form_name: PersonnelRequisitionForm
form_label: 人员需求申请单

fields:
  # 需求信息 (Requirement ID)，无需用户填写，系统自动生成
  - name: requirementId # 创建后才显示此字段
    label: 需求编号
    type: text
    readonly: true
    hint: '格式为：项目编码-部门编码-四位流水号 (例如 D25999-SAS999-0001)'
  - name: applicant
    label: 申请人
    type: text
    readonly: true
  - name: applicationTime
    label: 申请时间
    type: datetime # 使用日期时间类型更准确
    required: false
    readonly: true

  # 项目信息 (Basic Information)
  - name: projectNumber
    label: 项目号
    type: select
    placeholder: '请选择项目号' # 包含前期项目、合同项目、部门项目，支持模糊搜索
    required: true
  - name: projectName
    label: 项目名称
    type: text
    required: false
    readonly: true
    hint: '系统自动带出'
  - name: projectManager
    label: 项目经理
    type: text
    required: false
    readonly: true
    hint: '系统自动带出'
  - name: department
    label: 管理归属
    type: text
    required: false
    readonly: true
    hint: '系统自动带出'

  # 需求详情 (Requirement Details)
  - name: discipline
    label: 专业
    type: cascader # 二级级联：一级为专业大类，二级为二级专业
    required: true
    placeholder: '请选择专业大类 / 二级专业'
    hint: '从专业大类→二级专业依次选择；返回值为[大类, 二级]'
    options:
      - label: '施工'
        value: '施工'
        children:
          - label: '管理'
            value: '管理'
          - label: '综合'
            value: '综合'
