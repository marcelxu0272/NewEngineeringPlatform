  - name: requirementType
    label: 需求类型
    type: select
    required: false
    placeholder: '请选择需求类型'
    options:
      - label: '设计类'
        value: 'design'
      - label: 'PMC'
        value: 'pmc'
      - label: 'EPC'
        value: 'epc'
      - label: '咨询类'
        value: 'consulting'
  - name: jobTitle
    label: 职位/岗位名称
    type: text
    required: true
    placeholder: '请输入职位或岗位名称'
  - name: coreResponsibilities
    label: 岗位核心职责
    type: textarea # 使用多行文本框以便输入详细职责
    required: true
    placeholder: '请详细描述该岗位的核心工作职责，建议分点说明'
  - name: workLocation
    label: 工作地点
    type: text
    required: true
    placeholder: '请输入详细工作地点，例如：上海市'
  - name: requiredOnboardDate
    label: 要求到岗时间
    type: date # 使用日期选择器控件
    required: true
    placeholder: '请选择期望的到岗日期'
  - name: positionCycle
    label: 岗位周期
    type: text
    required: false
    placeholder: '例如：6个月 或 项目期'
  - name: quantity
    label: 数量
    type: number # 使用数字输入框
    required: true
    defaultValue: 1
    validation:
      min: 1
  - name: gender
    label: 性别
    type: radio # 使用单选按钮更直观
    required: false
    options:
      - label: '男'
        value: 'male'
      - label: '女'
        value: 'female'
      - label: '不限' # 补充“不限”选项，更符合招聘场景
        value: 'any'
  - name: ageRequirement
    label: 年龄要求
    type: age_range # 自定义一个复合类型，便于前端解析
    required: false
    hint: 空缺视为无要求
    fields:
      - name: minAge
        label: 最低年龄
        type: number
        validation:
          min: 16
      - name: maxAge
        label: 最高年龄
        type: number
        validation:
          min: 16

  # 资格要求 (Qualification Requirements)
  - name: titleRequirement
    label: 职称要求
    type: select
    required: false
    placeholder: '请选择职称要求'
    options:
      - label: '初级'
        value: 'junior'
      - label: '中级'
        value: 'intermediate'
      - label: '高级'
        value: 'senior'
      - label: '正高级'
        value: 'professor_level'
  - name: professionalCertificates
    label: 专业资格证书
    type: multiselect
    required: false
    placeholder: '请选择专业资格证书'
    hint: '可多选，支持自定义其他证书'
    options:
      - label: '注册化工'
        value: '注册化工'
      - label: '注册电气'
        value: '注册电气'
      - label: '注册给排水'
        value: '注册给排水'
      - label: '注册动力'
        value: '注册动力'
      - label: '注册暖通'
        value: '注册暖通'
      - label: '注册建筑'
        value: '注册建筑'
      - label: '注册一级结构'
        value: '注册一级结构'
      - label: '注册咨询'
        value: '注册咨询'
      - label: '注册一级建造'
        value: '注册一级建造'
      - label: '注册一级造价'
        value: '注册一级造价'
      - label: '注册安全'
        value: '注册安全'
      - label: '注册监理'
        value: '注册监理'
      - label: '三类人员B证'
        value: '三类人员B证'
      - label: '三类人员C证'
        value: '三类人员C证'
      - label: 'TUV'
        value: 'TUV'
      - label: 'PMP'
        value: 'PMP'
      - label: 'IPMP'
        value: 'IPMP'
      - label: '其他'
        value: '其他'
    allowCustom: true
    customPlaceholder: '请输入其他证书，多个用中文逗号，隔开'
    customHint: '例如：其他资格证书1，其他资格证书2，其他资格证书3（多个证书用中文逗号，分隔）'
  - name: experienceRequirement
    label: 经验要求
    type: textarea
    required: false
    placeholder: '例如：5年以上相关领域设计经验，有大型EPC项目经验者优先'
  - name: educationRequirement
    label: 教育背景
    type: textarea
    required: false
    placeholder: '例如：本科及以上学历，化学工程或相关专业'
  - name: languageRequirement
    label: 语言能力
    type: textarea
    required: false
    placeholder: '例如：英语CET-6，具备流利的英语读写和沟通能力'
  - name: otherRequirements
    label: 其他要求
    type: textarea
    required: false
    placeholder: '请填写其他补充要求'

